<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CD Archive - Hand Drawn Edition</title>
    <!-- Importamos la tipografía tipo marcador -->
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="carousel-container">
        <div class="cd-stack" id="cdStack"></div>
    </div>

    <div class="ui-layer">
        <div class="dock">
            <div class="color-swatch" id="colorBtn" style="background: #00f2ff;"></div>
            <input type="color" id="colorPicker" hidden>
            
            <div class="nav-dots" id="navDots"></div>

            <div class="controls">
                <button onclick="move(-1)">prev</button>
                <button onclick="move(1)">next</button>
            </div>
        </div>
        
        <!-- Input simple para cambiar el nombre del CD actual -->
        <div class="edit-box">
            <input type="text" id="nameInput" placeholder="Escribí acá..." maxlength="12">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
