<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CD Archive Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="carousel-container">
        <div class="cd-stack" id="cdStack">
            <!-- Los CDs se generan por JS -->
        </div>
    </div>

    <div class="ui-layer">
        <div class="album-label">
            <h1 id="currentTitle">Burial</h1>
        </div>

        <div class="dock">
            <div class="color-swatch" id="colorBtn" style="background: #00f2ff;"></div>
            <input type="color" id="colorPicker" hidden>
            
            <div class="nav-dots" id="navDots"></div>

            <div class="controls">
                <button onclick="move(-1)">prev</button>
                <button onclick="move(1)">next</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
